<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CoreDev | Загрузка платформы</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/preloader.css">
</head>
<body>

<div class="preloader">
    <div class="logo">Core<span>Dev</span></div>
    
    <div class="loader-3d">
        <div class="ring-layer ring-outer"></div>
        <div class="ring-layer ring-middle"></div>
        <div class="ring-layer ring-inner"></div>
        <div class="core-pulse">
            <i class="fas fa-microchip"></i>
        </div>
    </div>
    
    <div class="percentage" id="percentDisplay">0%</div>
    
    <div class="status-bar">
        <div class="status-dot"></div>
        <span class="status-text" id="statusMessage">Инициализация ядра</span>
        <div class="status-dot"></div>
    </div>
    
    <div class="message-box" id="messageBox">
        <i class="fas fa-sync-alt fa-fw"></i>
        <span class="message-text" id="dynamicMsg">Подготовка окружения...</span>
    </div>
</div>

<div class="global-progress">
    <div class="progress-line" id="progressLine"></div>
</div>

<div class="orbital-particles" id="orbitalContainer"></div>
<script src="/static/js/preloader.js"></script>
</body>
</html>
