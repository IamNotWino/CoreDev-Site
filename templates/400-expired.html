<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 | Ссылка просрочена</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/css/error.css">
</head>
<body>
    <main class="error-shell">
        <div class="error-orb error-orb-blue"></div>
        <div class="error-orb error-orb-red"></div>
        <section class="error-card">
            <div class="error-topline"><i class="fas fa-shield-virus"></i> CoreDev Security Gateway</div>
            <div class="error-code">400</div>
            <div class="error-icon"><i class="fas fa-hourglass-end"></i></div>
            <h1>Ссылка просрочена</h1>
            <p>Ссылка для сброса пароля уже использована или прошло больше 10 минут. Запросите новое письмо на странице входа.</p>
            <div class="error-hint">
                <i class="fas fa-lock"></i>
                Каждая ссылка одноразовая и действует только 10 минут — это защищает ваш аккаунт.
            </div>
            <div class="error-actions">
                <button class="btn-primary" id="retryExpiredBtn" type="button"><i class="fas fa-sync-alt"></i> Проверить снова</button>
            </div>
        </section>
    </main>
    <script src="/static/js/expired.js"></script>
</body>
</html>
